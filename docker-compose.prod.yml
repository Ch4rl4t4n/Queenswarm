# Production overlay — https://queenswarm.love
# Usage: ./scripts/deploy-prod.sh
#
# Phase 5.2: **~32 GB RAM** single-host posture (raise ``docker-compose.base.yml`` ceilings for DB, API, workers).
# For ~16 GB hosts, fork this file or override ``mem_limit`` via a local gitignored compose snippet.
#
# docker compose -p queenswarm_prod -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.prod up -d

name: queenswarm_prod

services:
  postgres:
    mem_limit: 4096m
    cpus: "2.0"

  redis:
    mem_limit: 768m
    cpus: "0.75"

  neo4j:
    environment:
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    mem_limit: 3072m
    cpus: "1.5"

  backend:
    env_file:
      - ${QS_ENV_FILE_PROD:-.env.prod}
    mem_limit: 12288m
    cpus: "4.0"

  celery-worker:
    env_file:
      - ${QS_ENV_FILE_PROD:-.env.prod}
    mem_limit: 4096m
    cpus: "2.0"

  celery-beat:
    env_file:
      - ${QS_ENV_FILE_PROD:-.env.prod}

  grafana:
    environment:
      GF_SERVER_DOMAIN: ${DOMAIN:-queenswarm.love}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://queenswarm.love/grafana/}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://queenswarm.love/api/v1}
        NEXT_PUBLIC_HIVE_WS_GUEST: ${NEXT_PUBLIC_HIVE_WS_GUEST:-true}
        NEXT_PUBLIC_BALLROOM_GUEST_WS: ${NEXT_PUBLIC_BALLROOM_GUEST_WS:-true}
        NEXT_PUBLIC_QS_POLL_PROFILE: ${NEXT_PUBLIC_QS_POLL_PROFILE:-low_ram}
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://queenswarm.love/api/v1}
      NEXT_PUBLIC_HIVE_WS_GUEST: ${NEXT_PUBLIC_HIVE_WS_GUEST:-true}
      NEXT_PUBLIC_BALLROOM_GUEST_WS: ${NEXT_PUBLIC_BALLROOM_GUEST_WS:-true}
      NEXT_PUBLIC_QS_POLL_PROFILE: ${NEXT_PUBLIC_QS_POLL_PROFILE:-low_ram}
      INTERNAL_BACKEND_ORIGIN: http://backend:8000
      HIVE_PROXY_JWT: ${DASHBOARD_JWT:-unset}
      NODE_ENV: production

  nginx:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/queenswarm.love.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
