# Queenswarm scrape config (mounted at /etc/prometheus/prometheus.yml in Compose).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - "localhost:9090"

  # FastAPI + prometheus_fastapi_instrumentator exposes /metrics
  - job_name: queenswarm-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - "backend:8000"
