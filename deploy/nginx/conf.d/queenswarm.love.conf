server {
    listen 80;
    listen [::]:80;
    server_name queenswarm.love www.queenswarm.love;
    return 301 https://$host$request_uri;
}

# Loopback-only health for Docker HEALTHCHECK (no TLS, not exposed publicly).
server {
    listen 127.0.0.1:8089;
    default_type text/plain;
    location = /nginx-health {
        return 200 "ok\n";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name queenswarm.love www.queenswarm.love;

    ssl_certificate /etc/letsencrypt/live/queenswarm.love/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/queenswarm.love/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:QS_SSL:10m;

    proxy_http_version 1.1;

    # Docker embedded DNS — static ``proxy_pass`` caches container IPs across ``docker compose up`` recreates.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Next.js BFF (must stay ahead of backend /api routes).
    location ^~ /api/auth/ {
        set $upstream_next frontend:3000;
        proxy_pass http://$upstream_next;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /api/proxy/ {
        set $upstream_next frontend:3000;
        proxy_pass http://$upstream_next;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # FastAPI versioned surface (hive dashboard proxy supplies Bearer JWT).
    location ^~ /api/v1/ {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /api/docs {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/openapi.json {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        set $upstream_grafana grafana:3000;
        proxy_pass http://$upstream_grafana/grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        set $upstream_next frontend:3000;
        proxy_pass http://$upstream_next;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }
}
