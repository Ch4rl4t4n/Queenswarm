# Nginx reverse proxy for queenswarm.love — TLS placeholders; mount real certs on the host/secret store.
# Upstream services: frontend:3000 (Next.js), backend:8000 (FastAPI).

upstream queenswarm_frontend {
    server frontend:3000;
    keepalive 32;
}

upstream queenswarm_api {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name queenswarm.love www.queenswarm.love;

    # Redirect HTTP → HTTPS in production after certificates exist:
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://queenswarm_api/api/;
    }

    location /health {
        proxy_http_version 1.1;
        proxy_pass http://queenswarm_api/health;
    }

    location /metrics {
        proxy_http_version 1.1;
        proxy_pass http://queenswarm_api/metrics;
    }

    location /docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://queenswarm_api/docs;
    }

    location /redoc {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://queenswarm_api/redoc;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://queenswarm_frontend;
    }
}

