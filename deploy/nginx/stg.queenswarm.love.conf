# Staging edge — https://stg.queenswarm.love
# Access: include-generated ``staging-guard.inc`` (Basic Auth + optional IP allowlist via ``scripts/deploy-stg.sh``).
# TLS: PEMs live under ``/etc/nginx/ssl/staging/`` (NOT under ``/etc/letsencrypt`` — that tree is a read-only
# host bind in ``docker-compose.base.yml``, so nested file mounts there fail with “read-only file system”).
# ``deploy-stg.sh`` generates self-signed PEMs; for real LE, bind-mount host fullchain/privkey onto the same paths.

server {
    listen 80;
    listen [::]:80;
    server_name stg.queenswarm.love;

    # ACME HTTP-01 (Let's Encrypt) must stay on port 80 without redirect/auth.
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        satisfy any;
        allow all;
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Loopback-only health for Docker HEALTHCHECK (no TLS, not exposed publicly).
server {
    listen 127.0.0.1:8089;
    default_type text/plain;
    location = /nginx-health {
        return 200 "ok\n";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name stg.queenswarm.love;

    ssl_certificate /etc/nginx/ssl/staging/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/staging/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:QS_SSL_STG:10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Generated by ``scripts/deploy-stg.sh`` — Basic Auth (+ optional satisfy any / allow / deny for IP bypass).
    include /etc/nginx/conf.d/staging-guard.inc;

    proxy_http_version 1.1;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend liveness + readiness — prefix match so ``/health/ready`` reaches FastAPI (not Next.js ``location /``).
    # Matches production posture in ``deploy/nginx/conf.d/queenswarm.love.conf``.
    location /health {
        auth_basic off;
        satisfy any;
        allow all;
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/auth/ {
        set $upstream_next frontend:3000;
        proxy_pass http://$upstream_next;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /api/proxy/ {
        set $upstream_next frontend:3000;
        proxy_pass http://$upstream_next;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /api/v1/ {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /api/docs {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/openapi.json {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        set $upstream_api backend:8000;
        proxy_pass http://$upstream_api/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        set $upstream_grafana grafana:3000;
        proxy_pass http://$upstream_grafana/grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        set $upstream_next frontend:3000;
        proxy_pass http://$upstream_next;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }
}
