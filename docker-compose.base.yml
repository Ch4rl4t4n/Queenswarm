# Queenswarm stack — canonical multi-env base (see docker-compose.stg.yml / docker-compose.prod.yml).
# Local single-file dev: keep using docker-compose.yml (same shape as this base).
#
# Phase 5.0: docker compose -f docker-compose.base.yml -f docker-compose.stg.yml --env-file .env.stg up -d

x-backend-env-files: &backend-env-files
  env_file:
    - .env

x-backend-build: &backend-build
  build:
    context: ./backend
    dockerfile: Dockerfile

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-queenswarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-queenswarm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    mem_limit: 1536m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-queenswarm} -d ${POSTGRES_DB:-queenswarm}"]
      interval: 8s
      timeout: 5s
      retries: 15
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "4"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    mem_limit: 448m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    mem_limit: 1536m
    cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "4"

  backend:
    <<: [*backend-build, *backend-env-files]
    command: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-queenswarm}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-queenswarm}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      VECTOR_STORE_BACKEND: ${VECTOR_STORE_BACKEND:-pgvector}
      DOMAIN: ${DOMAIN:-queenswarm.love}
      BALLROOM_GUEST_WS: ${BALLROOM_GUEST_WS:-true}
      HIVE_DASHBOARD_GUEST_WS: ${HIVE_DASHBOARD_GUEST_WS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    volumes:
      - ./backend/plugins/user:/app/plugins/user
      - ./backend/var/outputs:/app/var/outputs
      - ./backend/var/hive_mind/vault:/app/hive-mind/vault
    mem_limit: 6144m
    cpus: "2.75"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  celery-worker:
    <<: [*backend-build, *backend-env-files]
    command:
      ["celery", "-A", "app.worker.celery_app", "worker", "-l", "info", "-Q", "hive", "-c", "4", "-n", "worker@%h"]
    environment:
      QUEENSWARM_CELERY_WORKER: "true"
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-queenswarm}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-queenswarm}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      VECTOR_STORE_BACKEND: ${VECTOR_STORE_BACKEND:-pgvector}
      DOMAIN: ${DOMAIN:-queenswarm.love}
      BALLROOM_GUEST_WS: ${BALLROOM_GUEST_WS:-true}
      HIVE_DASHBOARD_GUEST_WS: ${HIVE_DASHBOARD_GUEST_WS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend/plugins/user:/app/plugins/user
    mem_limit: 2048m
    cpus: "1.25"
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  celery-beat:
    <<: [*backend-build, *backend-env-files]
    command: ["celery", "-A", "app.worker.celery_app", "beat", "-l", "info"]
    environment:
      QUEENSWARM_CELERY_WORKER: "true"
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-queenswarm}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-queenswarm}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      VECTOR_STORE_BACKEND: ${VECTOR_STORE_BACKEND:-pgvector}
      DOMAIN: ${DOMAIN:-queenswarm.love}
      BALLROOM_GUEST_WS: ${BALLROOM_GUEST_WS:-true}
      HIVE_DASHBOARD_GUEST_WS: ${HIVE_DASHBOARD_GUEST_WS:-true}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend/plugins/user:/app/plugins/user
    mem_limit: 320m
    cpus: "0.2"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.53.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PUBLISH_PORT:-9090}:9090"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.3.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-${GRAFANA_ADMIN_PASSWORD:-hiveadminchangeme}}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: ${DOMAIN:-queenswarm.love}
      GF_SERVER_ROOT_URL: "https://${DOMAIN:-queenswarm.love}/grafana/"
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-}
      GF_SMTP_PORT: ${GF_SMTP_PORT:-587}
      GF_SMTP_USER: ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS:-}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-Queenswarm Grafana}
      GF_SMTP_STARTTLS_POLICY: ${GF_SMTP_STARTTLS_POLICY:-OpportunisticStartTLS}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PUBLISH_PORT:-3030}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://queenswarm.love/api/v1}
        NEXT_PUBLIC_HIVE_WS_GUEST: ${NEXT_PUBLIC_HIVE_WS_GUEST:-true}
        NEXT_PUBLIC_BALLROOM_GUEST_WS: ${NEXT_PUBLIC_BALLROOM_GUEST_WS:-true}
        NEXT_PUBLIC_QS_POLL_PROFILE: ${NEXT_PUBLIC_QS_POLL_PROFILE:-default}
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://queenswarm.love/api/v1}
      NEXT_PUBLIC_HIVE_WS_GUEST: ${NEXT_PUBLIC_HIVE_WS_GUEST:-true}
      NEXT_PUBLIC_BALLROOM_GUEST_WS: ${NEXT_PUBLIC_BALLROOM_GUEST_WS:-true}
      NEXT_PUBLIC_QS_POLL_PROFILE: ${NEXT_PUBLIC_QS_POLL_PROFILE:-default}
      INTERNAL_BACKEND_ORIGIN: http://backend:8000
      HIVE_PROXY_JWT: ${DASHBOARD_JWT:-unset}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 4s
      retries: 20
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "4"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Interpolated from --env-file (staging sets QS_NGINX_SITE_CONF to stg vhost).
      - ${QS_NGINX_SITE_CONF:-./deploy/nginx/conf.d/queenswarm.love.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
      grafana:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:8089/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 4s
      retries: 8
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "4"

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
